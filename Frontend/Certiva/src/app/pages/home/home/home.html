<div class="full-page-gradient">
  <div class="d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar p-4">
      <div class="text-center mb-5">

        <img src="Image/LogoCertiva.png" width="80" alt="Logo" class="mb-3">
        <h4 class="fw-bold text-white">
          Certiva
        </h4>
      </div>

      <ul class="nav flex-column gap-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }">
            Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/home/eventos" routerLinkActive="active-link">
            Eventos
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/home/usuarios"
            routerLinkActive="active-link">
            Usuarios
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/home/roles" routerLinkActive="active-link">
            Roles
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/home/certificados" routerLinkActive="active-link">
            Certificados
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/home/inscripciones" routerLinkActive="active-link">
            Inscripciones
          </a>
        </li>

        <!-- <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home/configuracion"
            routerLinkActive="active-link">

            Configuración
          </a>
        </li> -->

        <li class="nav-item mt-4">
          <button
            class="btn btn-outline-light w-100" (click)="logout()">
            Cerrar sesión
          </button>
        </li>
      </ul>
    </aside>

    <!-- CONTENT -->
    <div class="content-area flex-grow-1">
      <!-- HEADER -->
      <header class="topbar px-4 py-3 d-flex justify-content-between align-items-center">
        <div>
          <h3 class="text-white fw-bold mb-0">
            Bienvenido {{ usuario?.nombres ?? 'Usuario' }} 👋
          </h3>

          <small class="text-white-50">
            Panel principal del sistema
          </small>
        </div>

        <div class="user-box d-flex align-items-center gap-3">
          <div class="text-end">
            <p class="mb-0 text-white fw-semibold">
              {{ usuario?.nombres }}
            </p>

            <small class="text-white-50">
              {{ usuario?.rol }}
            </small>
          </div>
          <img src="https://i.pravatar.cc/100" class="user-avatar" alt="User">
        </div>
      </header>
      <!-- CONTENT -->
      <div class="container-fluid p-4">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
