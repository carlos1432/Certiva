<div class="container-fluid pt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h2 class="text-white fw-bold mb-1">
        Eventos
      </h2>

      <p class="text-white-50 mb-0">
        Gestiona los eventos del sistema
      </p>
    </div>

    <button class="btn btn-primary px-4">
      <i class="bi bi-plus-circle me-2"></i>
      Nuevo Evento
    </button>

  </div>

  <!-- CARDS -->
  <div class="row g-5 justify-content-center mt-4">

    <!-- CURSOS -->
    <div class="col-12 col-md-6 col-xl-3">

      <div class="event-card h-100">

        <div class="event-banner bg-azul-800">
          <i class="bi bi-journal-code"></i>
        </div>

        <div class="p-4">

          <div class="d-flex justify-content-between align-items-start mb-3">

            <div>
              <h3 class="text-white fw-bold mb-1">Cursos</h3>
              <p class="text-white-50 mb-0">Formación activa</p>
            </div>

            <span class="badge bg-azul-800 px-3 py-2">
              18
            </span>

          </div>

          <div class="progress custom-progress mb-4">
            <div class="progress-bar bg-azul-800" style="width: 75%"></div>
          </div>

          <div class="row text-center mb-3">

            <div class="col">
              <h4 class="text-white fw-bold">320</h4>
              <small class="text-white-50">Estudiantes</small>
            </div>

            <div class="col">
              <h4 class="text-white fw-bold">12</h4>
              <small class="text-white-50">Instructores</small>
            </div>

          </div>

          <button class="btn btn-outline-light w-100">
            Ver cursos
          </button>

        </div>

      </div>

    </div>

    <!-- HACKATONES -->
    <div class="col-12 col-md-6 col-xl-3">

      <div class="event-card h-100">

        <div class="event-banner bg-indigo-800">
          <i class="bi bi-cpu-fill"></i>
        </div>

        <div class="p-4">

          <div class="d-flex justify-content-between align-items-start mb-3">

            <div>
              <h3 class="text-white fw-bold mb-1">Hackatones</h3>
              <p class="text-white-50 mb-0">Competencias tecnológicas</p>
            </div>

            <span class="badge bg-indigo-800 px-3 py-2">
              6
            </span>

          </div>

          <div class="progress custom-progress mb-4">
            <div class="progress-bar bg-indigo-800" style="width: 45%"></div>
          </div>

          <div class="row text-center mb-3">

            <div class="col">
              <h4 class="text-white fw-bold">150</h4>
              <small class="text-white-50">Participantes</small>
            </div>

            <div class="col">
              <h4 class="text-white fw-bold">20</h4>
              <small class="text-white-50">Equipos</small>
            </div>

          </div>

          <button class="btn btn-outline-light w-100">
            Ver hackatones
          </button>

        </div>

      </div>

    </div>

    <!-- FERIAS -->
    <div class="col-12 col-md-6 col-xl-3">

      <div class="event-card h-100">

        <div class="event-banner bg-purple-800">
          <i class="bi bi-easel-fill"></i>
        </div>

        <div class="p-4">

          <div class="d-flex justify-content-between align-items-start mb-3">

            <div>
              <h3 class="text-white fw-bold mb-1">Ferias de Proyectos</h3>
              <p class="text-white-50 mb-0">Innovación y exhibición</p>
            </div>

            <span class="badge bg-purple-800 px-3 py-2">
              10
            </span>

          </div>

          <div class="progress custom-progress mb-4">
            <div class="progress-bar bg-purple-800" style="width: 85%"></div>
          </div>

          <div class="row text-center mb-3">

            <div class="col">
              <h4 class="text-white fw-bold">80</h4>
              <small class="text-white-50">Proyectos</small>
            </div>

            <div class="col">
              <h4 class="text-white fw-bold">15</h4>
              <small class="text-white-50">Empresas</small>
            </div>

          </div>

          <button class="btn btn-outline-light w-100">
            Ver ferias
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
