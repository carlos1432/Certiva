<div class="full-page-gradient">
  <div class="container-fluid">
    <div class="row min-vh-100 align-items-center">
      <div class="col-12 col-md-5 col-lg-4">
        <div class="login-card p-5">
          <h1 class="fw-bold mb-3 text-white text-center">
            Login
          </h1>
          <p class="text-center text-white-50 mb-4">
            Inicia sesión para continuar
          </p>
          <form>
            <div class="mb-3">
              <p>Correo</p>
              <input type="email" class="form-control" placeholder="username@gmail.com">
            </div>
            <p>contraseña</p>
            <div class="mb-4">
              <input type="password" class="form-control" placeholder="contraseña">
            </div>
            <p>Has olvidado tu contraseña?</p>
            <button class="btn btn-primary w-100" routerLink="/home">
              Iniciar sesión
            </button>
          </form>

          <p class="mt-3 text-center">Todavía no tengo una cuenta?
            <a routerLink="/registrase" class="fw-bold text-white text-decoration-none">
                Registrarse
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
