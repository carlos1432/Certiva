<div class="full-page-gradient">
  <div class="container-fluid">
    <div class="row min-vh-100 align-items-center">
      <div class="col-12 col-md-5 col-lg-4">
        <div class="login-card p-5">
          <h1 class="fw-bold mb-3 text-white text-center">
            Login
          </h1>
          <p class="text-center text-white-50 mb-4">
            Inicia sesión para continuar
          </p>
          <form (ngSubmit)="iniciarSesion()">
            <div class="mb-3">
              <p class="text-white mb-1">Correo</p>
              <input
                type="email"
                class="form-control"
                placeholder="username@gmail.com"
                [(ngModel)]="credenciales.correo"
                name="correo"
                required
              />
            </div>
            <p class="text-white mb-1">Contraseña</p>
            <div class="mb-4">
              <input
                type="password"
                class="form-control"
                placeholder="contraseña"
                [(ngModel)]="credenciales.contrasena"
                name="contrasena"
                required
              />
            </div>
            @if (errorMensaje) {
              <p class="text-danger small mb-3">{{ errorMensaje }}</p>
            }
            <button
              type="submit"
              class="btn btn-primary w-100"
              [disabled]="cargando"
            >
              {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
            </button>
          </form>

          <p class="mt-3 text-center text-white">
            Todavía no tengo una cuenta?
            <a routerLink="/registrase" class="fw-bold text-white text-decoration-none">
              Registrarse
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
