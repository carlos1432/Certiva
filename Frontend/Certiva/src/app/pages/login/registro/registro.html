<div class="full-page-gradient">
  <div class="container-fluid">
    <div class="row min-vh-100 align-items-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="registro-card p-5">
          <h1 class="fw-bold mb-3 text-white text-center">
            Crear Cuenta
          </h1>

          <p class="text-white-50 mb-4">
            Únete a miles de estudiantes y organizadores en Certiva
          </p>

          <form>
            <div class="row">
              <!-- Columna izquierda -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label text-white">Nombre(s)</label>
                  <input type="text" class="form-control" placeholder="Juan">
                </div>

                <div class="mb-3">
                  <label class="form-label text-white">Apellidos</label>
                  <input type="text" class="form-control" placeholder="Pérez">
                </div>

                <div class="mb-3">
                  <label class="form-label text-white">Correo electrónico</label>
                  <input type="email" class="form-control" placeholder="correo@gmail.com">
                </div>
              </div>

              <!-- Columna derecha -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label text-white">Teléfono (opcional)</label>
                  <input type="text" class="form-control" placeholder="300 123 4567">
                </div>

                <div class="mb-3">
                  <label class="form-label text-white">Contraseña</label>
                  <input type="password" class="form-control" placeholder="********">
                </div>

                <div class="mb-3">
                  <label class="form-label text-white">Confirmar contraseña</label>
                  <input type="password" class="form-control" placeholder="********">
                </div>
              </div>
            </div>

            <button class="btn btn-primary w-100 mt-3">
              Crear cuenta
            </button>
          </form>

          <p class="mt-3 text-white-50 text-center">
            ¿Ya tienes cuenta?
            <a routerLink="/login" class="fw-bold text-white text-decoration-none">
              Iniciar sesión
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
